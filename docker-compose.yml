services:
  agent:
    build:
      context: .
      dockerfile: agent/Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      AGENT_PORT: 8080
      # O4: persist the crash-recovery tx journal on the mounted volume below so a
      # restart can reconcile any tx left in flight. Overrides AGENT_STATE_PATH in .env.
      AGENT_STATE_PATH: /data/state.json
    volumes:
      # Durable home for the tx journal (state.json) across container restarts.
      - ./data/agent:/data
    expose:
      - "8080"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    depends_on:
      - agent
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./web/dist:/srv:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
