name: Mantle Liquidity Monitor

# Pulls live USDY / mUSD DEX liquidity + peg from an environment that HAS network
# egress (the Claude sandbox is host-allowlisted and returns 403 for these hosts),
# then commits the snapshot to reports/. Manual trigger + weekly schedule.
#
# Works with zero configuration: the script defaults to the public Mantle RPC and
# public DeFiLlama endpoints, and reads token addresses from
# packages/shared/src/tokens.ts. Optionally set repo secret MANTLE_RPC_URL for a
# private RPC, and variable MIN_LIQUIDITY_USD to alert on thin liquidity.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC

permissions:
  contents: write

concurrency:
  group: liquidity-monitor
  cancel-in-progress: false

jobs:
  probe:
    name: Probe RWA liquidity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Probe Mantle RWA liquidity
        env:
          MANTLE_RPC_URL: ${{ secrets.MANTLE_RPC_URL }}
        run: node scripts/check-mantle-liquidity.mjs --write

      - name: Commit snapshot if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/mantle-liquidity.json reports/mantle-liquidity.md
          if git diff --staged --quiet; then
            echo "No change in liquidity snapshot."
          else
            git commit -m "chore(report): Mantle RWA liquidity snapshot [skip ci]"
            git push
          fi

      - name: Alert if liquidity below threshold
        # Opt-in: set repo variable MIN_LIQUIDITY_USD to fail the run (red) when
        # USDY/mUSD DEX liquidity drops below it. Runs after the commit so the
        # snapshot is always recorded even on an alert.
        if: ${{ vars.MIN_LIQUIDITY_USD != '' }}
        env:
          MANTLE_RPC_URL: ${{ secrets.MANTLE_RPC_URL }}
        run: node scripts/check-mantle-liquidity.mjs --min="${{ vars.MIN_LIQUIDITY_USD }}"
