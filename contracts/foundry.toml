[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
fs_permissions = [{ access = "read", path = "./" }]

[profile.ci]
verbosity = 2

# Mantle mainnet fork. Set MANTLE_RPC_URL in .env (host must be allowlisted).
[rpc_endpoints]
mantle = "${MANTLE_RPC_URL}"
mantle_testnet = "${MANTLE_TESTNET_RPC_URL}"

[etherscan]
mantle = { key = "${MANTLESCAN_API_KEY}", chain = 5000, url = "https://api.mantlescan.xyz/api" }

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
