name: CI

on:
  push:
    branches: ["claude/features", "claude/**", "cursor/**", "main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch: # on-demand fork tests against live Mantle mainnet

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── TypeScript / Node workspaces ─────────────────────────────────────────────
  ts:
    name: TS — typecheck · lint · test · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # No `version:` here — pnpm/action-setup@v4 reads it from the root
      # package.json `packageManager` field. Pinning both causes the action to
      # fail with "Multiple versions of pnpm specified".
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Lint
        run: pnpm -r lint

      - name: Test
        run: pnpm -r test

      - name: Build
        run: pnpm -r build

  # ── Solidity / Foundry ────────────────────────────────────────────────────────
  solidity:
    name: Solidity — build · unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.4.1

      - name: Build
        working-directory: contracts
        run: forge build

      - name: Unit tests (offline — no fork)
        working-directory: contracts
        # Exclude every fork-only suite (ForkTest, ForkPhase1bTest, …) — their
        # setUp() needs a live Mantle fork. Pattern matches any contract named *Fork*.
        run: forge test --no-match-contract 'Fork' -vv

  # ── Fork tests (live Mantle RPC — post-merge on main only) ───────────────────
  # These hit live Mantle mainnet (DEX liquidity, oracle NAV, Aave) so their
  # result depends on real-time on-chain state — e.g. USDC→USDY DEX routability.
  # Running them on every feature branch / PR would gate unrelated work (like
  # frontend PRs) on live liquidity, so restrict to pushes to `main` where a
  # failure is a genuine liquidity/integration regression signal. Run manually
  # via the Actions tab (workflow_dispatch) when validating contract changes.
  fork-tests:
    name: Solidity — fork tests (Mantle mainnet)
    runs-on: ubuntu-latest
    # `secrets` is NOT available in a job-level `if:`, so gate on the `vars` flag
    # (set MANTLE_RPC_URL as a repo *variable* alongside the secret to enable);
    # the secret still supplies the actual URL in the step env below.
    if: >-
      ${{ vars.MANTLE_RPC_URL != ''
        && ((github.event_name == 'push' && github.ref == 'refs/heads/main')
            || github.event_name == 'workflow_dispatch') }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.4.1

      - name: Fork tests
        working-directory: contracts
        env:
          MANTLE_RPC_URL: ${{ secrets.MANTLE_RPC_URL }}
        # Run every fork suite (ForkTest gate + ForkPhase1bTest Aave adapter + …).
        run: |
          forge test --fork-url "$MANTLE_RPC_URL" \
            --match-contract 'Fork' \
            -vv
